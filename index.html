      ? e('div', { style: { maxWidth: 300, margin: "40px auto", textAlign: "center" } },
          e('div', { style: { fontSize: 32, marginBottom: 16 } }, "🔒"),
          e('div', { style: { fontSize: 15, color: "#2c2c2c", marginBottom: 16, fontWeight: "bold" } }, "Área administrativa"),
          e('input', {
            type: "password", placeholder: "Contraseña",
            value: passInput, onChange: ev => setPassInput(ev.target.value),
            onKeyDown: ev => ev.key === "Enter" && (passInput === "lyl2024" ? setAdminOk(true) : alert("Contraseña incorrecta")),
            style: { width: "100%", padding: "10px", borderRadius: 8, border: "1px solid #ddd", fontSize: 14, marginBottom: 10, textAlign: "center" }
          }),
          e('button', {
            onClick: () => passInput === "lyl2024" ? setAdminOk(true) : alert("Contraseña incorrecta"),
            style: { width: "100%", padding: "11px", borderRadius: 8, border: "none", background: "#4a7c59", color: "#fff", cursor: "pointer", fontSize: 14, fontWeight: "bold" }
          }, "Ingresar")
        )
      : e('div', null,
          e('div', { style: { marginBottom: 12 } },
            e('input', {
              type: "text", placeholder: "Buscar producto...",
              value: buscarAdmin, onChange: ev => setBuscarAdmin(ev.target.value),
              style: { width: "100%", padding: "8px 10px", borderRadius: 8, border: "1px solid #ddd", fontSize: 13 }
            })
          ),
          e('div', { style: { display: "flex", gap: 8, marginBottom: 8 } },
            e('button', {
              onClick: exportarCatalogo,
              style: { flex: 1, padding: "10px", borderRadius: 8, border: "1px solid #4a7c59", background: "transparent", color: "#4a7c59", cursor: "pointer", fontSize: 12, fontWeight: "bold" }
            }, "💾 Exportar catálogo"),
            e('button', {
              onClick: () => { setModoSelAdmin(m => !m); setSelAdmin({}); },
              style: { padding: "10px 14px", borderRadius: 8, border: `1px solid ${modoSelAdmin ? "#c0392b" : "#ddd"}`, background: modoSelAdmin ? "#fdf0ee" : "transparent", color: modoSelAdmin ? "#c0392b" : "#666", cursor: "pointer", fontSize: 12, fontWeight: "bold" }
            }, modoSelAdmin ? "✕ Cancelar" : "☑ Seleccionar")
          ),
          modoSelAdmin && e('div', { style: { display: "flex", gap: 8, marginBottom: 10, alignItems: "center" } },
            e('button', {
              onClick: () => {
                const cat = catalogoEdit || window.LYL_PRODUCTOS;
                const sel = {};
                cat.forEach((p, i) => {
                  if (!buscarAdmin || p.articulo.toLowerCase().includes(buscarAdmin.toLowerCase()) || p.material.toLowerCase().includes(buscarAdmin.toLowerCase())) sel[i] = true;
                });
                setSelAdmin(sel);
              },
              style: { flex: 1, padding: "7px", borderRadius: 8, border: "1px solid #ddd", background: "transparent", color: "#666", cursor: "pointer", fontSize: 11 }
            }, "Seleccionar todos"),
            e('button', { onClick: () => setSelAdmin({}), style: { flex: 1, padding: "7px", borderRadius: 8, border: "1px solid #ddd", background: "transparent", color: "#666", cursor: "pointer", fontSize: 11 } }, "Deseleccionar"),
            Object.values(selAdmin).filter(Boolean).length > 0 && e('button', {
              onClick: () => { if (window.confirm("¿Eliminar " + Object.values(selAdmin).filter(Boolean).length + " productos?")) eliminarSeleccionados(); },
              style: { flex: 1, padding: "7px", borderRadius: 8, border: "none", background: "#c0392b", color: "#fff", cursor: "pointer", fontSize: 11, fontWeight: "bold" }
            }, "🗑 Eliminar (" + Object.values(selAdmin).filter(Boolean).length + ")")
          ),
          catalogoEdit && e('div', { style: { fontSize: 10, color: "#e07b39", marginBottom: 10 } }, "⚠️ Hay cambios sin exportar"),
          (catalogoEdit || window.LYL_PRODUCTOS)
            .map((p, i) => ({ ...p, _idx: i }))
            .filter(p => !buscarAdmin || p.articulo.toLowerCase().includes(buscarAdmin.toLowerCase()) || p.material.toLowerCase().includes(buscarAdmin.toLowerCase()))
            .map((p) => {
              const i = p._idx;
              return editando === i
                ? e('div', { key: i, style: { background: "#fff", borderRadius: 10, padding: 12, marginBottom: 8, border: "2px solid #4a7c59" } },
                    e('input', { value: formEdit.articulo || "", onChange: ev => setFormEdit(f => ({...f, articulo: ev.target.value})), placeholder: "Nombre", style: { width: "100%", padding: "7px 10px", borderRadius: 6, border: "1px solid #ddd", marginBottom: 6, fontSize: 13 } }),
                    e('input', { value: formEdit.medidas || "", onChange: ev => setFormEdit(f => ({...f, medidas: ev.target.value})), placeholder: "Medidas", style: { width: "100%", padding: "7px 10px", borderRadius: 6, border: "1px solid #ddd", marginBottom: 6, fontSize: 13 } }),
                    e('input', { type: "number", value: formEdit.precio || "", onChange: ev => setFormEdit(f => ({...f, precio: ev.target.value})), placeholder: "Precio", style: { width: "100%", padding: "7px 10px", borderRadius: 6, border: "1px solid #ddd", marginBottom: 6, fontSize: 13 } }),
                    e('select', { value: formEdit.material || "", onChange: ev => setFormEdit(f => ({...f, material: ev.target.value})), style: { width: "100%", padding: "7px 10px", borderRadius: 6, border: "1px solid #ddd", marginBottom: 10, fontSize: 13, background: "#fff" } },
                      MATERIALES.filter(m => m !== "Todos").map(m => e('option', { key: m, value: m }, m))
                    ),
                    e('div', { style: { display: "flex", gap: 8 } },
                      e('button', { onClick: guardarEdicion, style: { flex: 1, padding: "9px", borderRadius: 8, border: "none", background: "#4a7c59", color: "#fff", cursor: "pointer", fontSize: 13, fontWeight: "bold" } }, "✓ Guardar"),
                      e('button', { onClick: () => setEditando(null), style: { padding: "9px 14px", borderRadius: 8, border: "1px solid #ddd", background: "transparent", color: "#999", cursor: "pointer", fontSize: 13 } }, "Cancelar")
                    )
                  )
                : e('div', { key: i, style: { background: selAdmin[i] ? "#fff5f5" : "#fff", borderRadius: 10, padding: "10px 12px", marginBottom: 6, border: `1px solid ${selAdmin[i] ? "#f5c6c6" : "#ede9e3"}`, display: "flex", justifyContent: "space-between", alignItems: "center" } },
                    modoSelAdmin && e('input', {
                      type: "checkbox", checked: selAdmin[i] || false,
                      onChange: () => setSelAdmin(prev => ({ ...prev, [i]: !prev[i] })),
                      style: { width: 18, height: 18, accentColor: "#c0392b", cursor: "pointer", marginRight: 10, flexShrink: 0 }
                    }),
                    e('div', { style: { flex: 1, cursor: modoSelAdmin ? "pointer" : "default" }, onClick: modoSelAdmin ? () => setSelAdmin(prev => ({ ...prev, [i]: !prev[i] })) : undefined },
                      e('div', { style: { fontSize: 13, fontWeight: "bold", color: "#2c2c2c" } }, p.articulo + (p.medidas ? " " + p.medidas : "")),
                      e('div', { style: { fontSize: 11, color: "#999", marginTop: 2 } }, p.material + " · " + formatPrecio(p.precio))
                    ),
                    !modoSelAdmin && e('div', { style: { display: "flex", gap: 6 } },
                      e('button', {
                        onClick: () => { setEditando(i); setFormEdit({ articulo: p.articulo, medidas: p.medidas, precio: p.precio, material: p.material }); },
                        style: { padding: "5px 10px", borderRadius: 6, border: "1px solid #ddd", background: "transparent", color: "#666", cursor: "pointer", fontSize: 12 }
                      }, "✏️"),
                      e('button', {
                        onClick: () => { if (window.confirm("¿Eliminar " + p.articulo + "?")) eliminarProducto(i); },
                        style: { padding: "5px 10px", borderRadius: 6, border: "1px solid #fde", background: "transparent", color: "#c0392b", cursor: "pointer", fontSize: 12 }
                      }, "🗑")
                    )
                  );
            })
        )
  );

  // Modal selección para compartir
  const modalCompartirEl = modoCompartir && e('div', {
    style: { position: "fixed", inset: 0, background: "rgba(0,0,0,0.5)", display: "flex", alignItems: "flex-end", justifyContent: "center", zIndex: 1000 }
  },
    e('div', { style: { background: "#fff", borderRadius: "16px 16px 0 0", padding: 20, width: "100%", maxWidth: 480, maxHeight: "80vh", display: "flex", flexDirection: "column" } },
      e('div', { style: { display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14 } },
        e('span', { style: { fontSize: 15, fontWeight: "bold", color: "#2c2c2c" } }, "Seleccioná qué enviar"),
        e('button', { onClick: () => setModoCompartir(false), style: { background: "transparent", border: "none", fontSize: 20, color: "#999", cursor: "pointer" } }, "×")
      ),
      e('div', { style: { display: "flex", gap: 8, marginBottom: 12 } },
        e('button', {
          onClick: () => { const sel = {}; gruposBuscar.forEach((g,i) => { sel[i] = true; }); setSeleccionados(sel); },
          style: { flex: 1, padding: "6px", borderRadius: 8, border: "1px solid #4a7c59", background: "transparent", color: "#4a7c59", cursor: "pointer", fontSize: 12 }
        }, "Seleccionar todo"),
        e('button', {
          onClick: () => setSeleccionados({}),
          style: { flex: 1, padding: "6px", borderRadius: 8, border: "1px solid #ddd", background: "transparent", color: "#999", cursor: "pointer", fontSize: 12 }
        }, "Deseleccionar todo")
      ),
      e('div', { style: { overflowY: "auto", flex: 1, marginBottom: 12 } },
        gruposBuscar.map((g, i) => {
          const dc = matColors[g.material] || "#888";
          const ps = g.material === "Barro" ? "" : (g.pintada ? " · pintada" : " · sin pintar");
          return e('label', {
            key: i,
            style: { display: "flex", alignItems: "center", gap: 10, padding: "10px 4px", borderBottom: "1px solid #f0ede8", cursor: "pointer" }
          },
            e('input', {
              type: "checkbox",
              checked: seleccionados[i] || false,
              onChange: () => setSeleccionados(prev => ({ ...prev, [i]: !prev[i] })),
              style: { width: 18, height: 18, accentColor: "#4a7c59", cursor: "pointer", flexShrink: 0 }
            }),
            e('div', null,
              e('div', { style: { fontSize: 13, fontWeight: "bold", color: "#2c2c2c" } }, g.articulo + ps),
              e('div', { style: { fontSize: 11, color: "#999", marginTop: 2 } },
                g.variantes.map(v => v.medidas || "—").join(" · ")
              )
            )
          );
        })
      ),
      e('button', {
        onClick: enviarSeleccion,
        style: { width: "100%", padding: "13px", borderRadius: 10, border: "none", background: "#25D366", color: "#fff", cursor: "pointer", fontSize: 14, fontWeight: "bold" }
      }, `📲 Enviar ${Object.values(seleccionados).filter(Boolean).length} productos por WhatsApp`)
    )
  );


  // Modal importar pedido cliente
  const modalImportarClienteEl = modalImportarCliente && e('div', { style: { position: "fixed", inset: 0, background: "rgba(0,0,0,0.6)", display: "flex", alignItems: "flex-end", justifyContent: "center", zIndex: 1000 } },
    e('div', { style: { background: "#fff", borderRadius: "16px 16px 0 0", padding: 20, width: "100%", maxWidth: 480 } },
      e('div', { style: { display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 } },
        e('span', { style: { fontSize: 14, fontWeight: "bold", color: "#2c2c2c" } }, "📥 Importar pedido del cliente"),
        e('button', { onClick: () => setModalImportarCliente(false), style: { background: "transparent", border: "none", fontSize: 20, color: "#999", cursor: "pointer" } }, "×")
      ),
      e('div', { style: { fontSize: 12, color: "#666", marginBottom: 10 } }, "Pegá el mensaje completo que te envió el cliente por WhatsApp:"),
      e('textarea', {
        value: textoImport,
        onChange: ev => setTextoImport(ev.target.value),
        placeholder: "Pegá aquí el mensaje del cliente...",
        rows: 6,
        style: { width: "100%", padding: "10px", borderRadius: 8, border: "1px solid #ddd", fontSize: 12, fontFamily: "monospace", resize: "vertical", outline: "none" }
      }),
      e('div', { style: { display: "flex", gap: 8, marginTop: 10 } },
        e('button', { onClick: () => setModalImportarCliente(false), style: { flex: 1, padding: "11px", borderRadius: 8, border: "1px solid #ddd", background: "transparent", color: "#777", cursor: "pointer", fontSize: 13 } }, "Cancelar"),
        e('button', { onClick: () => importarPedidoCliente(textoImport), style: { flex: 1, padding: "11px", borderRadius: 8, border: "none", background: "#4a7c59", color: "#fff", cursor: "pointer", fontSize: 13, fontWeight: "bold" } }, "✓ Cargar pedido")
      ),
      historial.length > 0 && e('div', { style: { marginTop: 16, borderTop: "1px solid #f0ede8", paddingTop: 12 } },
        e('div', { style: { fontSize: 12, fontWeight: "bold", color: "#666", marginBottom: 8 } }, "Historial de presupuestos"),
        historial.map((h, i) =>
          e('div', { key: i, style: { display: "flex", justifyContent: "space-between", alignItems: "center", padding: "8px 0", borderBottom: i < historial.length - 1 ? "1px solid #f5f3ef" : "none" } },
            e('div', null,
              e('div', { style: { fontSize: 12, fontWeight: "bold", color: "#2c2c2c" } }, `${h.numero || "Sin nro"} — ${h.cliente || "Sin cliente"}`),
              e('div', { style: { fontSize: 10, color: "#888" } }, `${h.fecha} · ${h.items} productos · $${h.total?.toLocaleString("es-AR")}`)
            ),
            e('button', {
              onClick: () => {
                const d = h.datos;
                setPresupuesto(d.presupuesto || []);
                setCliente(d.cliente || ""); setProyecto(d.proyecto || "");
                setEnvio(d.envio || ""); setDescuento(d.descuento || "");
                setNumPresup(d.numPresup || ""); setMostrarAnticipo(d.mostrarAnticipo ?? true);
                saveBorrador(d); setVista("presupuesto"); setModalImportarCliente(false);
              },
              style: { padding: "5px 10px", borderRadius: 6, border: "1px solid #4a7c59", background: "transparent", color: "#4a7c59", cursor: "pointer", fontSize: 11 }
            }, "Reabrir")
          )
        )
      )
    )
  );

  return e('div', { style: { minHeight: "100vh", background: "#f8f6f2", fontFamily: "'Helvetica Neue', Arial, sans-serif", maxWidth: 480, margin: "0 auto" } },
    headerEl,
    tabsEl,
    e('div', { style: { overflowY: "auto" } },
      vista === "buscar" ? vistaBuscar : vista === "presupuesto" ? vistaPresupuesto : vistaAdminEl
    ),
    modalEl,
    confirmarEl,
    modalCompartirEl,
    modalImportarClienteEl
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
  </script>
</body>
</html>
