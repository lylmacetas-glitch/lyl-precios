    if (Object.keys(carrito).length === 0) { alert("Seleccioná al menos un producto."); return; }

    const items = Object.values(carrito);
    const fecha = new Date().toLocaleDateString("es-AR");

    // Texto WhatsApp
    let txt = `🌿 *Consulta de productos — LyL Macetas*\n`;
    txt += `👤 *${nombre.trim()}*\n`;
    txt += `📅 ${fecha}\n\n`;
    txt += `*Productos de interés:*\n`;
    items.forEach(i => {
      txt += `  • ${i.articulo}${i.medidas ? " " + i.medidas : ""}${i.pintada ? " (pintada)" : ""} — ${i.cantidad} u.\n`;
    });
    if (direccion.trim()) txt += `\n📍 *Dirección:* ${direccion.trim()}\n`;
    if (nota.trim()) txt += `📝 *Nota:* ${nota.trim()}\n`;
    txt += `\n_Consulta enviada desde lylmacetas.com.ar_\n\n`;

    // JSON para importar al presupuesto
    const json = JSON.stringify({
      cliente: nombre.trim(),
      fecha,
      items: items.map(i => ({
        articulo: i.articulo, medidas: i.medidas, material: i.material,
        pintada: i.pintada, precio: i.precio, cantidad: i.cantidad,
        total: i.precio * i.cantidad, nota: "", sin_descuento: false,
        key: `${i.articulo}||${i.medidas}||${i.material}||${i.pintada}||importado`
      })),
      nota: nota.trim(),
      subtotal: totalPrecio,
    });
    txt += `📋 *JSON para presupuesto:*\n${json}`;

    window.open(`https://wa.me/${WA_NUMBER}?text=${encodeURIComponent(txt)}`, "_blank");
    setEnviado(true);
  };

  // ── HEADER
  const header = e('div', { style: { background: "#fff", borderBottom: "2px solid #e8e4de", padding: "14px 16px", display: "flex", justifyContent: "space-between", alignItems: "center", position: "sticky", top: 0, zIndex: 100 } },
    e('div', null,
      e('img', { src: "https://www.lylmacetas.com.ar/wp-content/uploads/2022/02/logo-02.svg", alt: "LyL Macetas", style: { height: 36 } }),
      e('div', { style: { fontSize: 10, color: "#888", marginTop: 3 } }, `Lista de precios · ${FECHA_LISTA}`)
    ),
    totalItems > 0 && e('button', {
      onClick: () => setVista(vista === "catalogo" ? "pedido" : "catalogo"),
      style: { background: VERDE, border: "none", borderRadius: 20, padding: "7px 14px", color: "#fff", cursor: "pointer", fontSize: 12, fontWeight: "bold", display: "flex", alignItems: "center", gap: 6 }
    },
      vista === "catalogo" ? `🛒 Mi consulta (${totalItems})` : "← Seguir eligiendo"
    )
  );

  // ── CATÁLOGO
  const catalogo = e('div', { style: { padding: "12px 14px" } },
    e('div', { style: { background: "#f0f7f2", borderRadius: 10, padding: "10px 14px", marginBottom: 12, border: "1px solid #c8e6c9" } },
      e('div', { style: { fontSize: 12, color: VERDE_OSC, fontWeight: "bold" } }, "🌿 Bienvenido a LyL Macetas"),
      e('div', { style: { fontSize: 11, color: "#666", marginTop: 3 } }, "Seleccioná los productos que te interesan y envianos tu consulta. Te respondemos a la brevedad con un presupuesto personalizado.")
    ),
    // Buscador
    e('input', {
      type: "text", placeholder: "🔍 Buscar por nombre o medida...",
      value: buscar, onChange: ev => setBuscar(ev.target.value),
      style: { ...S.input, marginBottom: 10 }
    }),
    // Pills material
    e('div', { style: { display: "flex", gap: 5, flexWrap: "wrap", marginBottom: 8 } },
      MATERIALES.map(m =>
        e('button', {
          key: m,
          onClick: () => setMaterial(m),
          style: { padding: "4px 10px", borderRadius: 12, border: `1px solid ${material === m ? VERDE : "#ddd"}`, background: material === m ? VERDE + "22" : "transparent", color: material === m ? VERDE_OSC : "#777", fontSize: 11, cursor: "pointer", fontFamily: "inherit" }
        }, m)
      )
    ),
    // Pills pintada
    e('div', { style: { display: "flex", gap: 5, marginBottom: 12 } },
      ["Todos", "Pintada", "Sin pintar"].map(p =>
        e('button', {
          key: p,
          onClick: () => setPintada(p),
          style: { padding: "4px 10px", borderRadius: 12, border: `1px solid ${pintada === p ? VERDE : "#ddd"}`, background: pintada === p ? VERDE + "22" : "transparent", color: pintada === p ? VERDE_OSC : "#777", fontSize: 11, cursor: "pointer", fontFamily: "inherit" }
        }, p)
      )
    ),
    // Productos
    productosFiltrados.length === 0
      ? e('div', { style: { textAlign: "center", color: "#aaa", padding: 30 } }, "Sin resultados")
      : productosFiltrados.map((grupo, idx) => {
          const dc = matColors[grupo.material] || "#888";
          const ps = grupo.material === "Barro" ? "" : (grupo.pintada ? " · pintada" : " · sin pintar");
          return e('div', { key: idx, style: { background: "#fff", borderRadius: 10, marginBottom: 8, border: "1px solid #e8e4de", overflow: "hidden" } },
            e('div', { style: { padding: "9px 12px 7px", borderBottom: "1px solid #f0ede8" } },
              e('span', { style: { fontWeight: "bold", fontSize: 13, color: "#2c2c2c" } }, grupo.articulo),
              e('div', { style: { marginTop: 2, display: "flex", gap: 5, alignItems: "center" } },
                e('div', { style: { width: 6, height: 6, borderRadius: "50%", background: dc } }),
                e('span', { style: { fontSize: 10, color: "#999" } }, grupo.material + ps)
              )
            ),
            grupo.variantes.map((v, vi) => {
              const key = `${grupo.articulo}||${v.medidas}||${grupo.material}||${grupo.pintada}`;
              const enCarrito = carrito[key];
              return e('div', { key: vi, style: { display: "flex", justifyContent: "space-between", alignItems: "center", padding: "8px 12px", borderBottom: vi < grupo.variantes.length - 1 ? "1px solid #f5f3ef" : "none" } },
                e('div', null,
                  e('span', { style: { fontSize: 12, color: "#666" } }, v.medidas || "—"),
                  e('div', { style: { fontSize: 13, color: VERDE_OSC, fontWeight: "bold", marginTop: 1 } }, formatPrecio(v.precio))
                ),
                enCarrito
                  ? e('div', { style: { display: "flex", alignItems: "center", gap: 8 } },
                      e('button', { onClick: () => cambiarCantidad(key, -1), style: { width: 26, height: 26, borderRadius: "50%", border: `1px solid ${VERDE}`, background: "transparent", color: VERDE_OSC, cursor: "pointer", fontSize: 16, fontFamily: "inherit" } }, "−"),
                      e('span', { style: { fontSize: 14, fontWeight: "bold", color: "#333", minWidth: 16, textAlign: "center" } }, enCarrito.cantidad),
                      e('button', { onClick: () => cambiarCantidad(key, 1), style: { width: 26, height: 26, borderRadius: "50%", border: "none", background: VERDE, color: "#fff", cursor: "pointer", fontSize: 16, fontFamily: "inherit" } }, "+")
                    )
                  : e('button', {
                      onClick: () => agregarItem(grupo, v),
                      style: { padding: "5px 12px", borderRadius: 8, border: `1px solid ${VERDE}`, background: "transparent", color: VERDE_OSC, cursor: "pointer", fontSize: 12, fontFamily: "inherit" }
                    }, "+ Agregar")
              );
            })
          );
        })
  );

  // ── VISTA PEDIDO
  const pedidoVista = e('div', { style: { padding: "12px 14px" } },
    enviado
      ? e('div', { style: { textAlign: "center", padding: 40 } },
          e('div', { style: { fontSize: 48, marginBottom: 16 } }, "✅"),
          e('div', { style: { fontSize: 18, fontWeight: "bold", color: VERDE_OSC, marginBottom: 8 } }, "¡Consulta enviada!"),
          e('div', { style: { fontSize: 13, color: "#666", marginBottom: 24 } }, "Te respondemos a la brevedad con tu presupuesto."),
          e('button', {
            onClick: () => { setCarrito({}); setNombre(""); setDireccion(""); setNota(""); setEnviado(false); setVista("catalogo"); },
            style: { padding: "12px 24px", borderRadius: 10, border: "none", background: VERDE, color: "#fff", cursor: "pointer", fontSize: 14, fontFamily: "inherit" }
          }, "Nueva consulta")
        )
      : e('div', null,
          e('div', { style: { fontSize: 15, fontWeight: "bold", color: "#2c2c2c", marginBottom: 12 } }, "Tu consulta"),
          // Datos del cliente
          e('div', { style: { background: "#fff", borderRadius: 10, padding: 14, border: "1px solid #e8e4de", marginBottom: 10 } },
e('input', { type: "text", placeholder: "Tu nombre *", value: nombre, onChange: ev => setNombre(ev.target.value), style: { ...S.input, marginBottom: 8 } }),
            e('input', { type: "text", placeholder: "Dirección de entrega (opcional)", value: direccion, onChange: ev => setDireccion(ev.target.value), style: { ...S.input, marginBottom: 8 } }),
            e('input', { type: "text", placeholder: "Nota o consulta adicional (opcional)", value: nota, onChange: ev => setNota(ev.target.value), style: S.input })
          ),
          // Items seleccionados
          Object.values(carrito).map((item, i) => {
            const key = `${item.articulo}||${item.medidas}||${item.material}||${item.pintada}`;
            return e('div', { key: i, style: { background: "#fff", borderRadius: 10, padding: "10px 12px", marginBottom: 6, border: "1px solid #e8e4de", display: "flex", justifyContent: "space-between", alignItems: "center" } },
              e('div', null,
                e('div', { style: { fontSize: 13, fontWeight: "bold", color: "#2c2c2c" } }, item.articulo + (item.medidas ? " " + item.medidas : "")),
                e('div', { style: { fontSize: 11, color: "#888", marginTop: 2 } }, item.material + " · " + formatPrecio(item.precio) + " c/u")
              ),
              e('div', { style: { display: "flex", alignItems: "center", gap: 8 } },
                e('button', { onClick: () => cambiarCantidad(key, -1), style: { width: 26, height: 26, borderRadius: "50%", border: "1px solid #ddd", background: "transparent", color: "#666", cursor: "pointer", fontSize: 16, fontFamily: "inherit" } }, "−"),
                e('span', { style: { fontSize: 14, fontWeight: "bold", minWidth: 20, textAlign: "center" } }, item.cantidad),
                e('button', { onClick: () => cambiarCantidad(key, 1), style: { width: 26, height: 26, borderRadius: "50%", border: "none", background: VERDE, color: "#fff", cursor: "pointer", fontSize: 16, fontFamily: "inherit" } }, "+")
              )
            );
          }),
          // Total referencial
          e('div', { style: { background: "#f0f7f2", borderRadius: 10, padding: "12px 14px", marginTop: 8, border: "1px solid #c8e6c9" } },
            e('div', { style: { display: "flex", justifyContent: "space-between", fontSize: 13, color: "#555", marginBottom: 4 } },
              e('span', null, `${totalItems} productos seleccionados`),
              e('span', null, formatPrecio(totalPrecio))
            ),
            e('div', { style: { fontSize: 10, color: "#888", marginTop: 4 } }, "* Precio de referencia. El presupuesto final puede incluir descuentos y costos de envío.")
          ),
          e('button', {
            onClick: enviarPedido,
            style: { width: "100%", padding: 14, borderRadius: 10, border: "none", background: "#25D366", color: "#fff", cursor: "pointer", fontSize: 14, fontWeight: "bold", marginTop: 12, fontFamily: "inherit" }
          }, "📲 Enviar consulta por WhatsApp")
        )
  );

  return e('div', { style: { minHeight: "100vh", background: CREMA, fontFamily: "'Helvetica Neue', Arial, sans-serif", maxWidth: 480, margin: "0 auto" } },
    header,
    vista === "catalogo" ? catalogo : pedidoVista
  );
}
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
  </script>
</body>
</html>
