// LyL Macetas — Lista Paisajismo (Mayorista)
// ══════════════════════════════════════════════

const { useState, useMemo } = React;
const e = React.createElement;

const productos = window.LYL_PRODUCTOS;
const FECHA_LISTA = "24-mar-2026";
const WA_NUMBER = "5491157554899";

// Solo macetas — sin insumos ni sustratos
const MATERIALES_PAISA = ["Todos", "Barro", "Barro Artesanal", "Fibrocemento", "Rotomoldeado", "Fibra de Vidrio", "Cerámica", "Plástico"];

const matColors = {
  Barro: "#b5651d", "Barro Artesanal": "#8B4513",
  Fibrocemento: "#607d8b", Rotomoldeado: "#2e7d32",
  "Fibra de Vidrio": "#1565c0", Cerámica: "#ad1457",
  Plástico: "#6a1f8a",
};

const formatPrecio = (n) => "$\u00a0" + n.toLocaleString("es-AR", { minimumFractionDigits: 0 });

const AZUL = "#2c5f7a";
const AZUL_OSC = "#1a3a4e";
const CREMA = "#f8f6f2";

const S = {
  input: { width: "100%", padding: "9px 12px", borderRadius: 8, border: "1px solid #ddd", background: "#fff", color: "#333", fontSize: 13, outline: "none", fontFamily: "inherit" },
};

function App() {
  const [buscar, setBuscar] = useState("");
  const [material, setMaterial] = useState("Todos");
  const [pintada, setPintada] = useState("Todos");
  const [carrito, setCarrito] = useState({});
  const [nombre, setNombre] = useState("");
  const [empresa, setEmpresa] = useState("");
  const [nota, setNota] = useState("");
  const [vista, setVista] = useState("catalogo");
  const [enviado, setEnviado] = useState(false);

  const productosFiltrados = useMemo(() => {
    const b = buscar.toLowerCase();
    const filtrados = productos.filter(p => {
      if (!MATERIALES_PAISA.includes(p.material) || p.material === "Todos") return false;
      const mB = !b || p.articulo.toLowerCase().includes(b) || p.medidas.toLowerCase().includes(b);
      const mM = material === "Todos" || p.material === material;
      const mP = pintada === "Todos" || (pintada === "Pintada" && p.pintada) || (pintada === "Sin pintar" && !p.pintada);
      return mB && mM && mP;
    });
    const map = {};
    filtrados.forEach(p => {
      const k = `${p.articulo}||${p.material}||${p.pintada}`;
      if (!map[k]) map[k] = { ...p, variantes: [] };
      map[k].variantes.push({ medidas: p.medidas, precio: p.precio });
    });
    return Object.values(map);
  }, [buscar, material, pintada]);

  const totalItems = Object.values(carrito).reduce((s, v) => s + v.cantidad, 0);
  const totalPrecio = Object.values(carrito).reduce((s, v) => s + v.precio * v.cantidad, 0);

  const agregarItem = (prod, variante) => {
    const key = `${prod.articulo}||${variante.medidas}||${prod.material}||${prod.pintada}`;
    setCarrito(prev => ({
      ...prev,
      [key]: prev[key]
        ? { ...prev[key], cantidad: prev[key].cantidad + 1 }
        : { articulo: prod.articulo, medidas: variante.medidas, material: prod.material, pintada: prod.pintada, precio: variante.precio, cantidad: 1 }
    }));
  };

  const cambiarCantidad = (key, delta) => {
    setCarrito(prev => {
      const item = prev[key];
      if (!item) return prev;
      const nueva = item.cantidad + delta;
      if (nueva <= 0) { const { [key]: _, ...resto } = prev; return resto; }
      return { ...prev, [key]: { ...item, cantidad: nueva } };
    });
  };

  const enviarPedido = () => {
    if (!nombre.trim()) { alert("Por favor ingresá tu nombre antes de enviar."); return; }
    if (Object.keys(carrito).length === 0) { alert("Seleccioná al menos un producto."); return; }
    const items = Object.values(carrito);
    const fecha = new Date().toLocaleDateString("es-AR");
    let txt = `🌿 *Consulta Mayorista — LyL Macetas*\n`;
    txt += `👤 *${nombre.trim()}*${empresa.trim() ? " — " + empresa.trim() : ""}\n`;
    txt += `📅 ${fecha}\n\n`;
    txt += `*Productos de interés:*\n`;
    items.forEach(i => {
      txt += `  • ${i.articulo}${i.medidas ? " " + i.medidas : ""}${i.pintada ? " (pintada)" : ""} — ${i.cantidad} u.\n`;
    });
    if (nota.trim()) txt += `\n📝 *Nota:* ${nota.trim()}\n`;
    txt += `\n_Consulta mayorista enviada desde lylmacetas.com.ar_\n\n`;
    const json = JSON.stringify({
      cliente: nombre.trim() + (empresa.trim() ? " (" + empresa.trim() + ")" : ""),
      fecha, tipo: "mayorista",
      items: items.map(i => ({ articulo: i.articulo, medidas: i.medidas, material: i.material, pintada: i.pintada, precio: i.precio, cantidad: i.cantidad, total: i.precio * i.cantidad, nota: "", sin_descuento: false, key: `${i.articulo}||${i.medidas}||${i.material}||${i.pintada}||importado` })),
      nota: nota.trim(), subtotal: totalPrecio,
    });
    txt += `📋 *JSON para presupuesto:*\n${json}`;
    window.open(`https://wa.me/${WA_NUMBER}?text=${encodeURIComponent(txt)}`, "_blank");
    setEnviado(true);
  };

  const header = e('div', { style: { background: "#fff", borderBottom: "2px solid #e8e4de", padding: "14px 16px", display: "flex", justifyContent: "space-between", alignItems: "center", position: "sticky", top: 0, zIndex: 100 } },
    e('div', null,
      e('img', { src: "https://www.lylmacetas.com.ar/wp-content/uploads/2022/02/logo-02.svg", alt: "LyL Macetas", style: { height: 36 } }),
      e('div', { style: { fontSize: 10, color: "#888", marginTop: 3 } }, `Lista mayorista · Paisajismo · ${FECHA_LISTA}`)
    ),
    totalItems > 0 && e('button', {
      onClick: () => setVista(vista === "catalogo" ? "pedido" : "catalogo"),
      style: { background: AZUL, border: "none", borderRadius: 20, padding: "7px 14px", color: "#fff", cursor: "pointer", fontSize: 12, fontWeight: "bold", fontFamily: "inherit" }
    }, vista === "catalogo" ? `🛒 Mi consulta (${totalItems})` : "← Seguir eligiendo")
  );

  const catalogo = e('div', { style: { padding: "12px 14px" } },
    e('div', { style: { background: "#e8f0f5", borderRadius: 10, padding: "10px 14px", marginBottom: 12, border: "1px solid #b8d4e8" } },
      e('div', { style: { fontSize: 12, color: AZUL_OSC, fontWeight: "bold" } }, "🏗 Lista para Arquitectos y Paisajistas"),
      e('div', { style: { fontSize: 11, color: "#555", marginTop: 3 } }, "Precios mayoristas. Seleccioná los productos para tu proyecto y envianos tu consulta.")
    ),
    e('input', { type: "text", placeholder: "🔍 Buscar...", value: buscar, onChange: ev => setBuscar(ev.target.value), style: { ...S.input, marginBottom: 10 } }),
    e('div', { style: { display: "flex", gap: 5, flexWrap: "wrap", marginBottom: 8 } },
      MATERIALES_PAISA.map(m => e('button', { key: m, onClick: () => setMaterial(m), style: { padding: "4px 10px", borderRadius: 12, border: `1px solid ${material === m ? AZUL : "#ddd"}`, background: material === m ? AZUL + "22" : "transparent", color: material === m ? AZUL_OSC : "#777", fontSize: 11, cursor: "pointer", fontFamily: "inherit" } }, m))
    ),
    e('div', { style: { display: "flex", gap: 5, marginBottom: 12 } },
      ["Todos", "Pintada", "Sin pintar"].map(p => e('button', { key: p, onClick: () => setPintada(p), style: { padding: "4px 10px", borderRadius: 12, border: `1px solid ${pintada === p ? AZUL : "#ddd"}`, background: pintada === p ? AZUL + "22" : "transparent", color: pintada === p ? AZUL_OSC : "#777", fontSize: 11, cursor: "pointer", fontFamily: "inherit" } }, p))
    ),
    productosFiltrados.length === 0
      ? e('div', { style: { textAlign: "center", color: "#aaa", padding: 30 } }, "Sin resultados")
      : productosFiltrados.map((grupo, idx) => {
          const dc = matColors[grupo.material] || "#888";
          const ps = grupo.material === "Barro" ? "" : (grupo.pintada ? " · pintada" : " · sin pintar");
          return e('div', { key: idx, style: { background: "#fff", borderRadius: 10, marginBottom: 8, border: "1px solid #e8e4de", overflow: "hidden" } },
            e('div', { style: { padding: "9px 12px 7px", borderBottom: "1px solid #f0ede8" } },
              e('span', { style: { fontWeight: "bold", fontSize: 13, color: "#2c2c2c" } }, grupo.articulo),
              e('div', { style: { marginTop: 2, display: "flex", gap: 5, alignItems: "center" } },
                e('div', { style: { width: 6, height: 6, borderRadius: "50%", background: dc } }),
                e('span', { style: { fontSize: 10, color: "#999" } }, grupo.material + ps)
              )
            ),
            grupo.variantes.map((v, vi) => {
              const key = `${grupo.articulo}||${v.medidas}||${grupo.material}||${grupo.pintada}`;
              const enCarrito = carrito[key];
              return e('div', { key: vi, style: { display: "flex", justifyContent: "space-between", alignItems: "center", padding: "8px 12px", borderBottom: vi < grupo.variantes.length - 1 ? "1px solid #f5f3ef" : "none" } },
                e('div', null,
                  e('span', { style: { fontSize: 12, color: "#666" } }, v.medidas || "—"),
                  e('div', { style: { fontSize: 13, color: AZUL_OSC, fontWeight: "bold", marginTop: 1 } }, formatPrecio(v.precio))
                ),
                enCarrito
                  ? e('div', { style: { display: "flex", alignItems: "center", gap: 8 } },
                      e('button', { onClick: () => cambiarCantidad(key, -1), style: { width: 26, height: 26, borderRadius: "50%", border: `1px solid ${AZUL}`, background: "transparent", color: AZUL_OSC, cursor: "pointer", fontSize: 16, fontFamily: "inherit" } }, "−"),
                      e('span', { style: { fontSize: 14, fontWeight: "bold", minWidth: 16, textAlign: "center" } }, enCarrito.cantidad),
                      e('button', { onClick: () => cambiarCantidad(key, 1), style: { width: 26, height: 26, borderRadius: "50%", border: "none", background: AZUL, color: "#fff", cursor: "pointer", fontSize: 16, fontFamily: "inherit" } }, "+")
                    )
                  : e('button', { onClick: () => agregarItem(grupo, v), style: { padding: "5px 12px", borderRadius: 8, border: `1px solid ${AZUL}`, background: "transparent", color: AZUL_OSC, cursor: "pointer", fontSize: 12, fontFamily: "inherit" } }, "+ Agregar")
              );
            })
          );
        })
  );

  const pedidoVista = e('div', { style: { padding: "12px 14px" } },
    enviado
      ? e('div', { style: { textAlign: "center", padding: 40 } },
          e('div', { style: { fontSize: 48, marginBottom: 16 } }, "✅"),
          e('div', { style: { fontSize: 18, fontWeight: "bold", color: AZUL_OSC, marginBottom: 8 } }, "¡Consulta enviada!"),
          e('div', { style: { fontSize: 13, color: "#666", marginBottom: 24 } }, "Te respondemos a la brevedad."),
          e('button', { onClick: () => { setCarrito({}); setNombre(""); setEmpresa(""); setNota(""); setEnviado(false); setVista("catalogo"); }, style: { padding: "12px 24px", borderRadius: 10, border: "none", background: AZUL, color: "#fff", cursor: "pointer", fontSize: 14, fontFamily: "inherit" } }, "Nueva consulta")
        )
      : e('div', null,
          e('div', { style: { fontSize: 15, fontWeight: "bold", color: "#2c2c2c", marginBottom: 12 } }, "Tu consulta mayorista"),
          e('div', { style: { background: "#fff", borderRadius: 10, padding: 14, border: "1px solid #e8e4de", marginBottom: 10 } },
            e('input', { type: "text", placeholder: "Nombre y apellido *", value: nombre, onChange: ev => setNombre(ev.target.value), style: { ...S.input, marginBottom: 8 } }),
            e('input', { type: "text", placeholder: "Empresa / Estudio (opcional)", value: empresa, onChange: ev => setEmpresa(ev.target.value), style: { ...S.input, marginBottom: 8 } }),
            e('input', { type: "text", placeholder: "Nota o detalle del proyecto (opcional)", value: nota, onChange: ev => setNota(ev.target.value), style: S.input })
          ),
          Object.values(carrito).map((item, i) => {
            const key = `${item.articulo}||${item.medidas}||${item.material}||${item.pintada}`;
            return e('div', { key: i, style: { background: "#fff", borderRadius: 10, padding: "10px 12px", marginBottom: 6, border: "1px solid #e8e4de", display: "flex", justifyContent: "space-between", alignItems: "center" } },
              e('div', null,
                e('div', { style: { fontSize: 13, fontWeight: "bold", color: "#2c2c2c" } }, item.articulo + (item.medidas ? " " + item.medidas : "")),
                e('div', { style: { fontSize: 11, color: "#888", marginTop: 2 } }, item.material + " · " + formatPrecio(item.precio) + " c/u")
              ),
              e('div', { style: { display: "flex", alignItems: "center", gap: 8 } },
                e('button', { onClick: () => cambiarCantidad(key, -1), style: { width: 26, height: 26, borderRadius: "50%", border: "1px solid #ddd", background: "transparent", color: "#666", cursor: "pointer", fontSize: 16, fontFamily: "inherit" } }, "−"),
                e('span', { style: { fontSize: 14, fontWeight: "bold", minWidth: 20, textAlign: "center" } }, item.cantidad),
                e('button', { onClick: () => cambiarCantidad(key, 1), style: { width: 26, height: 26, borderRadius: "50%", border: "none", background: AZUL, color: "#fff", cursor: "pointer", fontSize: 16, fontFamily: "inherit" } }, "+")
              )
            );
          }),
          e('div', { style: { background: "#e8f0f5", borderRadius: 10, padding: "12px 14px", marginTop: 8, border: "1px solid #b8d4e8" } },
            e('div', { style: { display: "flex", justifyContent: "space-between", fontSize: 13, color: "#555" } },
              e('span', null, `${totalItems} productos`),
              e('span', null, formatPrecio(totalPrecio))
            ),
            e('div', { style: { fontSize: 10, color: "#888", marginTop: 4 } }, "* Precio de referencia lista mayorista. El presupuesto final puede incluir descuentos por volumen.")
          ),
          e('button', { onClick: enviarPedido, style: { width: "100%", padding: 14, borderRadius: 10, border: "none", background: "#25D366", color: "#fff", cursor: "pointer", fontSize: 14, fontWeight: "bold", marginTop: 12, fontFamily: "inherit" } }, "📲 Enviar consulta por WhatsApp")
        )
  );

  return e('div', { style: { minHeight: "100vh", background: CREMA, fontFamily: "'Helvetica Neue', Arial, sans-serif", maxWidth: 480, margin: "0 auto" } },
    header,
    vista === "catalogo" ? catalogo : pedidoVista
  );
}
